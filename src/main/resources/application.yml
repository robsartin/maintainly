spring:
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  servlet:
    multipart:
      max-file-size: 512KB
      max-request-size: 512KB
  datasource:
    url: jdbc:postgresql://localhost:5434/mystuffdb
    username: postgres
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  model-and-view-allowed: true
  packages-to-scan: solutions.mystuff.application.web

app:
  jwt:
    secret: dev-only-hmac-secret-key-minimum-32-bytes-long!!
    expiration: 3600
  rate-limit:
    requests-per-second: 10
    login-requests-per-second: 3
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] [%X{correlationId:-none}] [org:%X{organizationId:-none}] %-5level %logger{36} - %msg%n"
