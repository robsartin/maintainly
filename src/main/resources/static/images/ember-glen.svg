<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="16" fill="#5D4037"/>
  <g fill="none" stroke="#FFF8E1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- roof -->
    <polygon points="64,14 16,52 112,52" fill="#8D6E63" stroke="#FFF8E1"/>
    <!-- roof ridge detail -->
    <line x1="40" y1="33" x2="64" y2="14"/>
    <line x1="88" y1="33" x2="64" y2="14"/>
    <!-- house body -->
    <rect x="24" y="52" width="80" height="58" fill="#A1887F" stroke="#FFF8E1"/>
    <!-- second floor windows -->
    <rect x="34" y="58" width="14" height="14" fill="#FFE082" stroke="#FFF8E1"/>
    <line x1="41" y1="58" x2="41" y2="72"/>
    <line x1="34" y1="65" x2="48" y2="65"/>
    <rect x="80" y="58" width="14" height="14" fill="#FFE082" stroke="#FFF8E1"/>
    <line x1="87" y1="58" x2="87" y2="72"/>
    <line x1="80" y1="65" x2="94" y2="65"/>
    <!-- first floor windows -->
    <rect x="34" y="82" width="14" height="14" fill="#FFE082" stroke="#FFF8E1"/>
    <line x1="41" y1="82" x2="41" y2="96"/>
    <line x1="34" y1="89" x2="48" y2="89"/>
    <rect x="80" y="82" width="14" height="14" fill="#FFE082" stroke="#FFF8E1"/>
    <line x1="87" y1="82" x2="87" y2="96"/>
    <line x1="80" y1="89" x2="94" y2="89"/>
    <!-- front door -->
    <rect x="55" y="82" width="18" height="28" rx="2" fill="#4E342E" stroke="#FFF8E1"/>
    <circle cx="69" cy="97" r="1.5" fill="#FFE082"/>
    <!-- door transom -->
    <line x1="55" y1="88" x2="73" y2="88"/>
    <!-- chimney -->
    <rect x="86" y="22" width="10" height="30" fill="#6D4C41" stroke="#FFF8E1"/>
    <!-- shutters hint -->
    <line x1="31" y1="58" x2="31" y2="72"/>
    <line x1="51" y1="58" x2="51" y2="72"/>
    <line x1="77" y1="58" x2="77" y2="72"/>
    <line x1="97" y1="58" x2="97" y2="72"/>
  </g>
  <text x="64" y="122" text-anchor="middle" fill="#FFF8E1" font-family="serif" font-size="11" font-weight="bold">EMBER GLEN</text>
</svg>
