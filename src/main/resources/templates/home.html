<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Maintainly</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
<header>
    <h1>Maintainly</h1>
    <nav>
        <span th:if="${username}" th:text="'Logged in as ' + ${username}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline"
              sec:authorize="isAuthenticated()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Logout</button>
        </form>
    </nav>
</header>
<main>
    <div th:if="${error}">
        <p class="error" th:text="${error}"></p>
    </div>
    <div th:if="${noOrganization}">
        <p>You are not assigned to an organization.
           Please contact an administrator.</p>
    </div>
    <div th:unless="${noOrganization}">
        <section id="search">
            <form method="get" th:action="@{/}">
                <input type="text" name="q" placeholder="Search items..."
                       th:value="${q}"/>
                <button type="submit">Search</button>
            </form>
        </section>
        <section id="item-list">
            <h2>Items</h2>
            <p th:if="${#lists.isEmpty(items)}">No items found.</p>
            <table th:unless="${#lists.isEmpty(items)}">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Manufacturer</th>
                    <th>Model</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.location}"></td>
                    <td th:text="${item.manufacturer}"></td>
                    <td th:text="${item.modelName}"></td>
                    <td>
                        <button type="button"
                                hx-get th:hx-get="@{'/items/' + ${item.id} + '/service-form'}"
                                hx-target="#service-form-area"
                                hx-swap="innerHTML">
                            Log Service
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
        <section id="schedules" th:if="${schedules != null and !#lists.isEmpty(schedules)}">
            <h2>Upcoming Service</h2>
            <table>
                <thead>
                <tr>
                    <th>Item</th>
                    <th>Service Type</th>
                    <th>Next Due</th>
                    <th>Frequency</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${schedules}"
                    th:classappend="${s.nextDueDate != null
                        and s.nextDueDate.isBefore(T(java.time.LocalDate).now())}
                        ? 'overdue' : ''">
                    <td th:text="${s.item.name}"></td>
                    <td th:text="${s.serviceType.name}"></td>
                    <td th:text="${s.nextDueDate}"></td>
                    <td th:text="'Every ' + ${s.frequencyInterval} + ' ' + ${s.frequencyUnit}"></td>
                </tr>
                </tbody>
            </table>
        </section>
        <section id="service-form-area"></section>
    </div>
</main>
</body>
</html>
