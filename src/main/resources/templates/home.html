<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Maintainly</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
    function toggleForm(id) {
        var row = document.getElementById(id);
        if (row) {
            row.style.display = row.style.display === 'none' ? '' : 'none';
        }
    }
    function onVendorChange(select) {
        var row = select.closest('tr');
        var fields = row.querySelector('.new-vendor-fields');
        fields.style.display = select.value === '__new__' ? '' : 'none';
        if (select.value !== '__new__') {
            fields.querySelectorAll('input').forEach(function(i) { i.value = ''; });
        }
    }
    </script>
</head>
<body>
<header>
    <div class="header-brand">
        <img th:if="${organization != null and organization.logoUrl != null}"
             th:src="${organization.logoUrl}"
             alt="Organization logo" class="org-logo"/>
        <div>
            <h1>Maintainly</h1>
            <span th:if="${organization != null}"
                  class="org-name" th:text="${organization.name}"></span>
        </div>
    </div>
    <nav>
        <span th:if="${username}" th:text="'Logged in as ' + ${username}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline"
              sec:authorize="isAuthenticated()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Logout</button>
        </form>
    </nav>
</header>
<main>
    <div th:if="${error}">
        <p class="error" th:text="${error}"></p>
    </div>
    <div th:if="${noOrganization}">
        <p>You are not assigned to an organization.
           Please contact an administrator.</p>
    </div>
    <div th:unless="${noOrganization}">
        <section id="search">
            <form method="get" th:action="@{/}">
                <input type="text" name="q" placeholder="Search items..."
                       th:value="${q}"/>
                <button type="submit">Search</button>
            </form>
        </section>
        <section id="item-list">
            <h2>Items</h2>
            <p th:if="${#lists.isEmpty(items)}">No items found.</p>
            <table th:unless="${#lists.isEmpty(items)}">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Manufacturer</th>
                    <th>Model</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="item : ${items}">
                <tr>
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.location}"></td>
                    <td th:text="${item.manufacturer}"></td>
                    <td th:text="${item.modelName}"></td>
                    <td class="actions">
                        <button type="button" class="btn-icon btn-log"
                                th:attr="onclick='toggleForm(\'item-log-' + ${item.id} + '\')'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                            </svg>
                            Log
                        </button>
                        <button type="button" class="btn-icon btn-schedule"
                                th:attr="onclick='toggleForm(\'item-sched-' + ${item.id} + '\')'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                                <line x1="12" y1="14" x2="12" y2="18"/>
                                <line x1="10" y1="16" x2="14" y2="16"/>
                            </svg>
                            Schedule
                        </button>
                    </td>
                </tr>
                <tr th:id="'item-log-' + ${item.id}" class="form-row" style="display:none">
                    <td colspan="5">
                        <form method="post" th:action="@{/item/log}" class="inline-form">
                            <input type="hidden" name="itemId" th:value="${item.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Date <input type="date" name="serviceDate" required/></label>
                            <label>Summary <input type="text" name="summary" required
                                                  placeholder="What was done"/></label>
                            <label>Tech <input type="text" name="techName"
                                               placeholder="Technician name"/></label>
                            <button type="submit" class="btn-log">Save</button>
                        </form>
                    </td>
                </tr>
                <tr th:id="'item-sched-' + ${item.id}" class="form-row" style="display:none">
                    <td colspan="5">
                        <form method="post" th:action="@{/item/schedule}" class="inline-form">
                            <input type="hidden" name="itemId" th:value="${item.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Type
                                <select name="serviceTypeId" required>
                                    <option value="">Select...</option>
                                    <option th:each="st : ${serviceTypes}"
                                            th:value="${st.id}" th:text="${st.name}"></option>
                                </select>
                            </label>
                            <label>Vendor
                                <select name="vendorId" onchange="onVendorChange(this)">
                                    <option value="">None</option>
                                    <option th:each="v : ${vendors}"
                                            th:value="${v.id}" th:text="${v.name}"></option>
                                    <option value="__new__">+ New vendor...</option>
                                </select>
                            </label>
                            <span class="new-vendor-fields" style="display:none">
                                <label>Name <input type="text" name="newVendorName"
                                                   placeholder="Vendor name"/></label>
                                <label>Phone <input type="text" name="newVendorPhone"
                                                    placeholder="Phone"/></label>
                            </span>
                            <label>Next Due <input type="date" name="nextDueDate" required/></label>
                            <label>Every <input type="number" name="frequencyInterval"
                                                min="1" value="1" required style="width:4rem"/></label>
                            <label>
                                <select name="frequencyUnit" required>
                                    <option th:each="fu : ${frequencyUnits}"
                                            th:value="${fu}" th:text="${fu}"></option>
                                </select>
                            </label>
                            <button type="submit" class="btn-schedule">Create</button>
                        </form>
                    </td>
                </tr>
                </th:block>
                </tbody>
            </table>
        </section>
        <section id="schedules" th:if="${schedules != null and !#lists.isEmpty(schedules)}">
            <h2>Upcoming Service</h2>
            <table>
                <thead>
                <tr>
                    <th>Item</th>
                    <th>Service Type</th>
                    <th>Vendor</th>
                    <th>Next Due</th>
                    <th>Frequency</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="s : ${schedules}">
                <tr th:classappend="${s.nextDueDate == null ? ''
                        : (s.nextDueDate.isBefore(today)
                            ? 'schedule-overdue'
                            : (s.nextDueDate.isBefore(soon)
                                ? 'schedule-soon'
                                : 'schedule-ok'))}">
                    <td th:text="${s.item.name}"></td>
                    <td th:text="${s.serviceType.name}"></td>
                    <td th:text="${s.preferredVendor != null ? s.preferredVendor.name : ''}"></td>
                    <td th:text="${s.nextDueDate}"></td>
                    <td th:text="'Every ' + ${s.frequencyInterval} + ' ' + ${s.frequencyUnit}"></td>
                    <td class="actions">
                        <button type="button" class="btn-icon btn-log"
                                th:attr="onclick='toggleForm(\'log-' + ${s.id} + '\')'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                            </svg>
                            Log
                        </button>
                        <form method="post" th:action="@{/schedule/delete}" style="display:inline">
                            <input type="hidden" name="scheduleId" th:value="${s.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-icon btn-delete"
                                    onclick="return confirm('Delete this schedule?')">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    <line x1="10" y1="11" x2="10" y2="17"/>
                                    <line x1="14" y1="11" x2="14" y2="17"/>
                                </svg>
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:id="'log-' + ${s.id}" class="form-row" style="display:none">
                    <td colspan="6">
                        <form method="post" th:action="@{/schedule/log}" class="inline-form">
                            <input type="hidden" name="scheduleId" th:value="${s.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Date <input type="date" name="serviceDate" required/></label>
                            <label>Summary <input type="text" name="summary" required
                                                  placeholder="What was done"/></label>
                            <label>Tech <input type="text" name="techName"
                                               placeholder="Technician name"/></label>
                            <button type="submit" class="btn-log">Save</button>
                        </form>
                    </td>
                </tr>
                </th:block>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
