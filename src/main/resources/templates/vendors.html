<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<div th:replace="~{layout :: toasts}"></div>
<main>
<main id="main-content">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li><a th:href="@{/}">Home</a></li>
            <li>Vendors</li>
        </ol>
    </nav>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${noOrganization}" class="alert alert-warning">
        No organization assigned. Please contact your administrator.
    </div>

    <div th:unless="${noOrganization}" class="section-header">
        <h2>Vendors</h2>
        <div>
            <button type="button" class="btn-icon btn-add" title="Add vendor"
                    data-toggle-form="add-vendor-form">
                <svg th:replace="~{fragments/icons :: icon-plus}"></svg>
            </button>
            <a th:href="@{/vendors/export}" class="btn-icon btn-schedule" title="Export all vendors">
                <svg th:replace="~{fragments/icons :: icon-download}"></svg>
            </a>
            <button type="button" class="btn-icon btn-log" title="Import vendors"
                    data-toggle-form="import-vendor-form">
                <svg th:replace="~{fragments/icons :: icon-upload}"></svg>
            </button>
        </div>
    </div>

    <div id="import-vendor-form" style="display:none" class="add-form">
        <form th:action="@{/vendors/import}" method="post" enctype="multipart/form-data"
              class="inline-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label>vCard file: <input type="file" name="file" accept=".vcf" required/></label>
            <button type="submit" class="btn-icon btn-add" title="Upload">
                <svg th:replace="~{fragments/icons :: icon-checkmark}"></svg>
            </button>
            <button type="button" class="btn-icon btn-cancel" title="Cancel"
                    data-toggle-form="import-vendor-form">
                <svg th:replace="~{fragments/icons :: icon-cancel}"></svg>
            </button>
        </form>
    </div>

    <div id="add-vendor-form" style="display:none" class="vendor-form-panel">
        <h3>New Vendor</h3>
        <form th:action="@{/vendors}" method="post" class="vendor-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label>Name <input type="text" name="name" required maxlength="200"/></label>
            <label>Phone <input type="text" name="phone" maxlength="50"/></label>
            <label>Email <input type="email" name="email" maxlength="320"/></label>
            <label>Address Line 1 <input type="text" name="addressLine1" maxlength="200"/></label>
            <label>Address Line 2 <input type="text" name="addressLine2" maxlength="200"/></label>
            <label>City <input type="text" name="city" maxlength="100"/></label>
            <label>State/Province <input type="text" name="stateProvince" maxlength="100"/></label>
            <label>Postal Code <input type="text" name="postalCode" maxlength="30"/></label>
            <label>Country <input type="text" name="country" maxlength="100"/></label>
            <label>Website <input type="url" name="website" maxlength="2000"/></label>
            <label>Notes <textarea name="notes" maxlength="2000"></textarea></label>
            <fieldset class="alt-phones-section">
                <legend>Additional Phones</legend>
                <div class="alt-phone-list">
                    <div class="alt-phone-template" style="display:none">
                        <label>Phone <input type="text" name="altPhoneNumber" maxlength="50"/></label>
                        <label>Label <input type="text" name="altPhoneLabel" maxlength="50"
                                            placeholder="e.g. mobile"/></label>
                        <button type="button" class="btn-icon btn-delete btn-remove-alt-phone"
                                title="Remove">
                            <svg th:replace="~{fragments/icons :: icon-cancel}"></svg>
                        </button>
                    </div>
                </div>
                <button type="button" class="btn-icon btn-add-alt-phone" title="Add phone">
                    <svg th:replace="~{fragments/icons :: icon-plus}"></svg>
                    Add phone
                </button>
            </fieldset>
            <button type="submit" class="btn-icon btn-add" title="Save">
                <svg th:replace="~{fragments/icons :: icon-checkmark}"></svg>
            </button>
            <button type="button" class="btn-icon btn-cancel" title="Cancel"
                    data-toggle-form="add-vendor-form">
                <svg th:replace="~{fragments/icons :: icon-cancel}"></svg>
            </button>
        </form>
    </div>

    <div class="table-scroll-wrapper">
    <table th:unless="${noOrganization}" class="data-table">
        <thead>
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>City</th>
            <th>Website</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(vendors)}">
            <td colspan="6" class="empty-state">No vendors yet. Click the <strong>+</strong> button above to add one.</td>
        </tr>
        <th:block th:each="vendor : ${vendors}">
            <tr>
                <td th:text="${vendor.name}"></td>
                <td>
                    <span th:text="${vendor.phone}"></span>
                    <span th:if="${!vendor.altPhones.isEmpty()}"
                          th:text="'(+' + ${vendor.altPhones.size()} + ' more)'"
                          class="alt-phone-count"></span>
                </td>
                <td th:text="${vendor.email}"></td>
                <td th:text="${vendor.city}"></td>
                <td th:text="${vendor.website}"></td>
                <td class="actions">
                    <button th:unless="${vendor.systemManaged}"
                            type="button" class="btn-icon" title="Edit vendor"
                            th:data-toggle-form="'edit-' + ${vendor.id}">
                        <svg th:replace="~{fragments/icons :: icon-vendor-edit}"></svg>
                    </button>
                    <a th:href="@{/vendors/export/{id}(id=${vendor.id})}"
                       class="btn-icon" title="Export vendor">
                        <svg th:replace="~{fragments/icons :: icon-download}"></svg>
                    </a>
                    <form th:unless="${vendor.systemManaged}"
                          th:action="@{/vendors/{id}(id=${vendor.id})}" method="post" style="display:inline">
                        <input type="hidden" name="_method" value="DELETE"/>
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-icon btn-delete" title="Delete vendor"
                                data-confirm-submit="Delete this vendor?"
                                th:data-confirm-name="${vendor.name}">
                            <svg th:replace="~{fragments/icons :: icon-trash}"></svg>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:id="'edit-' + ${vendor.id}" style="display:none">
                <td colspan="6">
                    <form th:action="@{/vendors/{id}(id=${vendor.id})}" method="post" class="vendor-form">
                        <input type="hidden" name="_method" value="PUT"/>
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <label>Name <input type="text" name="name" th:value="${vendor.name}"
                                           required maxlength="200"/></label>
                        <label>Phone <input type="text" name="phone" th:value="${vendor.phone}"
                                            maxlength="50"/></label>
                        <label>Email <input type="email" name="email" th:value="${vendor.email}"
                                            maxlength="320"/></label>
                        <label>Address Line 1 <input type="text" name="addressLine1"
                                                      th:value="${vendor.addressLine1}"
                                                      maxlength="200"/></label>
                        <label>Address Line 2 <input type="text" name="addressLine2"
                                                      th:value="${vendor.addressLine2}"
                                                      maxlength="200"/></label>
                        <label>City <input type="text" name="city" th:value="${vendor.city}"
                                           maxlength="100"/></label>
                        <label>State/Province <input type="text" name="stateProvince"
                                                      th:value="${vendor.stateProvince}"
                                                      maxlength="100"/></label>
                        <label>Postal Code <input type="text" name="postalCode"
                                                   th:value="${vendor.postalCode}"
                                                   maxlength="30"/></label>
                        <label>Country <input type="text" name="country"
                                              th:value="${vendor.country}"
                                              maxlength="100"/></label>
                        <label>Website <input type="url" name="website"
                                              th:value="${vendor.website}"
                                              maxlength="2000"/></label>
                        <label>Notes <textarea name="notes" maxlength="2000"
                                               th:text="${vendor.notes}"></textarea></label>
                        <fieldset class="alt-phones-section">
                            <legend>Additional Phones</legend>
                            <div class="alt-phone-list">
                                <div th:each="ap : ${vendor.altPhones}" class="alt-phone-row">
                                    <label>Phone <input type="text" name="altPhoneNumber"
                                                        th:value="${ap.phone}" maxlength="50"/></label>
                                    <label>Label <input type="text" name="altPhoneLabel"
                                                        th:value="${ap.label}" maxlength="50"
                                                        placeholder="e.g. mobile"/></label>
                                    <button type="button"
                                            class="btn-icon btn-delete btn-remove-alt-phone"
                                            title="Remove">
                                        <svg th:replace="~{fragments/icons :: icon-cancel}"></svg>
                                    </button>
                                </div>
                                <div class="alt-phone-template" style="display:none">
                                    <label>Phone <input type="text" name="altPhoneNumber"
                                                        maxlength="50"/></label>
                                    <label>Label <input type="text" name="altPhoneLabel"
                                                        maxlength="50"
                                                        placeholder="e.g. mobile"/></label>
                                    <button type="button"
                                            class="btn-icon btn-delete btn-remove-alt-phone"
                                            title="Remove">
                                        <svg th:replace="~{fragments/icons :: icon-cancel}"></svg>
                                    </button>
                                </div>
                            </div>
                            <button type="button" class="btn-icon btn-add-alt-phone"
                                    title="Add phone">
                                <svg th:replace="~{fragments/icons :: icon-plus}"></svg>
                                Add phone
                            </button>
                        </fieldset>
                        <button type="submit" class="btn-icon btn-add" title="Save">
                <svg th:replace="~{fragments/icons :: icon-checkmark}"></svg>
            </button>
                        <button type="button" class="btn-icon btn-cancel" title="Cancel"
                                th:data-toggle-form="'edit-' + ${vendor.id}">
                            <svg th:replace="~{fragments/icons :: icon-cancel}"></svg>
                        </button>
                    </form>
                </td>
            </tr>
        </th:block>
        </tbody>
    </table>
    </div>
</main>
</body>
</html>
