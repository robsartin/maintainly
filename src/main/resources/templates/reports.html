<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<main>
    <div th:if="${noOrganization}">
        <p>You are not assigned to an organization.
           Please contact an administrator.</p>
    </div>
    <div th:unless="${noOrganization}">
        <section id="reports">
            <h2>Reports</h2>
            <table>
                <thead>
                <tr>
                    <th>Report</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>Service Due Soon</td>
                    <td>Overdue and upcoming service
                        due by end of month</td>
                    <td>
                        <a th:href="@{/reports/service-summary}"
                           target="_blank"
                           class="btn-icon btn-log"
                           title="Generate PDF">
                            <svg th:replace="~{fragments/icons :: icon-log}"></svg>
                            PDF
                        </a>
                    </td>
                </tr>
                <tr>
                    <td>Item Service History</td>
                    <td>Service history and active
                        schedules for one item</td>
                    <td>
                        <form class="inline-form"
                              data-open-window="/reports/item-history">
                            <select name="itemId" required>
                                <option value="">
                                    Select item...</option>
                                <option th:each="i : ${items}"
                                        th:value="${i.id}"
                                        th:text="${i.name}">
                                </option>
                            </select>
                            <button type="submit"
                                    class="btn-icon btn-log"
                                    title="Generate PDF">
                                <svg th:replace="~{fragments/icons :: icon-log}"></svg>
                                PDF
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
