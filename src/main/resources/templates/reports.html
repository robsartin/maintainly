<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<main>
    <div th:if="${noOrganization}">
        <p>You are not assigned to an organization.
           Please contact an administrator.</p>
    </div>
    <div th:unless="${noOrganization}">
        <section id="reports">
            <h2>Reports</h2>
            <table>
                <thead>
                <tr>
                    <th>Report</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>Upcoming Scheduled Service</td>
                    <td>All active service schedules
                        with next due dates</td>
                    <td>
                        <a th:href="@{/reports/service-summary}"
                           target="_blank"
                           class="btn-icon btn-log"
                           title="Generate PDF">
                            <svg xmlns="http://www.w3.org/2000/svg"
                                 width="16" height="16"
                                 viewBox="0 0 24 24"
                                 fill="none"
                                 stroke="currentColor"
                                 stroke-width="2"
                                 stroke-linecap="round"
                                 stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                                <polyline points="10 9 9 9 8 9"/>
                            </svg>
                            PDF
                        </a>
                    </td>
                </tr>
                <tr>
                    <td>Item Service History</td>
                    <td>Service history and active
                        schedules for one item</td>
                    <td>
                        <form class="inline-form"
                              onsubmit="return openItemHistory(this)">
                            <select name="itemId" required>
                                <option value="">
                                    Select item...</option>
                                <option th:each="i : ${items}"
                                        th:value="${i.id}"
                                        th:text="${i.name}">
                                </option>
                            </select>
                            <button type="submit"
                                    class="btn-icon btn-log"
                                    title="Generate PDF">
                                <svg xmlns="http://www.w3.org/2000/svg"
                                     width="16" height="16"
                                     viewBox="0 0 24 24"
                                     fill="none"
                                     stroke="currentColor"
                                     stroke-width="2"
                                     stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <line x1="16" y1="13" x2="8" y2="13"/>
                                    <line x1="16" y1="17" x2="8" y2="17"/>
                                    <polyline points="10 9 9 9 8 9"/>
                                </svg>
                                PDF
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
<script>
function openItemHistory(form) {
    var itemId = form.itemId.value;
    if (!itemId) return false;
    window.open('/reports/item-history?itemId=' + itemId,
        '_blank');
    return false;
}
</script>
</body>
</html>
