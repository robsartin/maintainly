<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MyStuff</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
    function toggleForm(id) {
        var row = document.getElementById(id);
        if (row) {
            var showing = row.style.display === 'none';
            row.style.display = showing ? '' : 'none';
            if (showing) {
                var dateInput = row.querySelector('input[type="date"]');
                if (dateInput && !dateInput.value) {
                    dateInput.value = new Date().toISOString().slice(0, 10);
                }
            }
        }
    }
    function onVendorChange(select) {
        var row = select.closest('tr');
        var fields = row.querySelector('.new-vendor-fields');
        fields.style.display = select.value === '__new__' ? '' : 'none';
        if (select.value !== '__new__') {
            fields.querySelectorAll('input').forEach(function(i) { i.value = ''; });
        }
    }
    </script>
</head>
<body>
<header th:fragment="header">
    <div class="header-brand">
        <img th:if="${organization != null and organization.logoUrl != null}"
             th:src="${organization.logoUrl}"
             alt="Organization logo" class="org-logo"/>
        <div>
            <h1>MyStuff</h1>
            <span th:if="${organization != null}"
                  class="org-name" th:text="${organization.name}"></span>
        </div>
    </div>
    <nav>
        <a th:href="@{/items}" class="nav-link">Items</a>
        <a th:href="@{/schedules}" class="nav-link">Schedules</a>
        <span th:if="${username}" th:text="'Logged in as ' + ${username}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline"
              sec:authorize="isAuthenticated()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-icon btn-logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Logout
            </button>
        </form>
    </nav>
</header>
</body>
</html>
