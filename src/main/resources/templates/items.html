<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<main>
    <div th:if="${error}">
        <p class="error" th:text="${error}"></p>
    </div>
    <div th:if="${noOrganization}">
        <p>You are not assigned to an organization.
           Please contact an administrator.</p>
    </div>
    <div th:unless="${noOrganization}">
        <section id="search">
            <form method="get" th:action="@{/items}">
                <input type="text" name="q" placeholder="Search items..."
                       th:value="${q}"/>
                <button type="submit" class="btn-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    Search
                </button>
            </form>
        </section>
        <section id="item-list">
            <div class="section-header">
                <h2>Items</h2>
                <button type="button" class="btn-icon btn-add"
                        onclick="toggleForm('add-item-form')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    Add Item
                </button>
            </div>
            <div id="add-item-form" style="display:none" class="add-form">
                <form method="post" th:action="@{/items/add}" class="inline-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <label>Name <input type="text" name="name" required
                                       placeholder="Item name"/></label>
                    <label>Location <input type="text" name="location"
                                           placeholder="Location"/></label>
                    <label>Manufacturer <input type="text" name="manufacturer"
                                               placeholder="Manufacturer"/></label>
                    <label>Model <input type="text" name="modelName"
                                        placeholder="Model name"/></label>
                    <label>Serial # <input type="text" name="serialNumber"
                                           placeholder="Serial number"/></label>
                    <button type="submit" class="btn-icon btn-add">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        Save
                    </button>
                </form>
            </div>
            <p th:if="${#lists.isEmpty(items)}">No items found.</p>
            <table th:unless="${#lists.isEmpty(items)}">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Manufacturer</th>
                    <th>Model</th>
                    <th>Serial #</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="item : ${items}">
                <tr>
                    <td><a th:href="@{/items/detail(itemId=${item.id})}"
                           th:text="${item.name}" class="item-link"
                           th:classappend="${selectedItemId != null and selectedItemId.equals(item.id)} ? ' selected'"></a></td>
                    <td th:text="${item.location}"></td>
                    <td th:text="${item.manufacturer}"></td>
                    <td th:text="${item.modelName}"></td>
                    <td th:text="${item.serialNumber}"></td>
                    <td class="actions">
                        <button type="button" class="btn-icon btn-log"
                                th:attr="onclick='toggleForm(\'item-log-' + ${item.id} + '\')'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                            </svg>
                            Log
                        </button>
                        <button type="button" class="btn-icon btn-schedule"
                                th:attr="onclick='toggleForm(\'item-sched-' + ${item.id} + '\')'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                                <line x1="12" y1="14" x2="12" y2="18"/>
                                <line x1="10" y1="16" x2="14" y2="16"/>
                            </svg>
                            Schedule
                        </button>
                    </td>
                </tr>
                <tr th:id="'item-log-' + ${item.id}" class="form-row" style="display:none">
                    <td colspan="6">
                        <form method="post" th:action="@{/items/log}" class="inline-form">
                            <input type="hidden" name="itemId" th:value="${item.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Date <input type="date" name="serviceDate" required/></label>
                            <label>Summary <input type="text" name="summary" required
                                                  placeholder="What was done"/></label>
                            <label>Vendor
                                <select name="vendorId" onchange="onVendorChange(this)">
                                    <option value="">None</option>
                                    <option th:each="v : ${vendors}"
                                            th:value="${v.id}" th:text="${v.name}"></option>
                                    <option value="__new__">+ New vendor...</option>
                                </select>
                            </label>
                            <span class="new-vendor-fields" style="display:none">
                                <label>Name <input type="text" name="newVendorName"
                                                   placeholder="Vendor name"/></label>
                                <label>Phone <input type="text" name="newVendorPhone"
                                                    placeholder="Phone"/></label>
                            </span>
                            <label>Tech <input type="text" name="techName"
                                               placeholder="Technician name"/></label>
                            <button type="submit" class="btn-icon btn-log">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                                Save
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:id="'item-sched-' + ${item.id}" class="form-row" style="display:none">
                    <td colspan="6">
                        <form method="post" th:action="@{/items/schedule}" class="inline-form">
                            <input type="hidden" name="itemId" th:value="${item.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Type
                                <select name="serviceTypeId" required>
                                    <option value="">Select...</option>
                                    <option th:each="st : ${serviceTypes}"
                                            th:value="${st.id}" th:text="${st.name}"></option>
                                </select>
                            </label>
                            <label>Vendor
                                <select name="vendorId" onchange="onVendorChange(this)">
                                    <option value="">None</option>
                                    <option th:each="v : ${vendors}"
                                            th:value="${v.id}" th:text="${v.name}"></option>
                                    <option value="__new__">+ New vendor...</option>
                                </select>
                            </label>
                            <span class="new-vendor-fields" style="display:none">
                                <label>Name <input type="text" name="newVendorName"
                                                   placeholder="Vendor name"/></label>
                                <label>Phone <input type="text" name="newVendorPhone"
                                                    placeholder="Phone"/></label>
                            </span>
                            <label>Next Due <input type="date" name="nextDueDate" required/></label>
                            <label>Every <input type="number" name="frequencyInterval"
                                                min="1" value="1" required style="width:4rem"/></label>
                            <label>
                                <select name="frequencyUnit" required>
                                    <option th:each="fu : ${frequencyUnits}"
                                            th:value="${fu}" th:text="${fu}"></option>
                                </select>
                            </label>
                            <button type="submit" class="btn-icon btn-schedule">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                                Create
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${selectedItemId != null and selectedItemId.equals(item.id)}"
                    class="detail-row">
                    <td colspan="6">
                        <div class="item-detail">
                            <div class="detail-section" th:if="${itemRecords != null and !#lists.isEmpty(itemRecords)}">
                                <h4>Service History</h4>
                                <table class="detail-table">
                                    <thead><tr><th>Date</th><th>Summary</th><th>Details</th></tr></thead>
                                    <tbody>
                                    <tr th:each="r : ${itemRecords}">
                                        <td th:text="${r.serviceDate}"></td>
                                        <td th:text="${r.summary}"></td>
                                        <td th:text="${r.description}"></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                            <p th:if="${itemRecords == null or #lists.isEmpty(itemRecords)}"
                               class="detail-empty">No service history.</p>
                            <div class="detail-section" th:if="${itemSchedules != null and !#lists.isEmpty(itemSchedules)}">
                                <h4>Schedules</h4>
                                <table class="detail-table">
                                    <thead><tr><th>Service Type</th><th>Next Due</th><th>Frequency</th><th>Last Completed</th><th>Status</th></tr></thead>
                                    <tbody>
                                    <tr th:each="is : ${itemSchedules}">
                                        <td th:text="${is.serviceType.name}"></td>
                                        <td th:text="${is.nextDueDate}"></td>
                                        <td th:text="'Every ' + ${is.frequencyInterval} + ' ' + ${is.frequencyUnit}"></td>
                                        <td th:text="${is.lastCompletedDate != null ? is.lastCompletedDate : 'Never'}"></td>
                                        <td th:text="${is.active ? 'Active' : 'Inactive'}"></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                            <p th:if="${itemSchedules == null or #lists.isEmpty(itemSchedules)}"
                               class="detail-empty">No schedules.</p>
                        </div>
                    </td>
                </tr>
                </th:block>
                </tbody>
            </table>
            <nav th:if="${itemPage != null and itemPage.totalPages() > 1}" class="pagination">
                <a th:if="${itemPage.hasPrevious()}"
                   th:href="@{/items(page=${itemPage.page() - 1},size=${itemPage.size()},q=${q})}">Prev</a>
                <span th:text="'Page ' + (${itemPage.page()} + 1) + ' of ' + ${itemPage.totalPages()}"></span>
                <a th:if="${itemPage.hasNext()}"
                   th:href="@{/items(page=${itemPage.page() + 1},size=${itemPage.size()},q=${q})}">Next</a>
                <label class="page-size-label">Show
                    <select onchange="window.location.href='/items?size=' + this.value">
                        <option value="10" th:selected="${itemPage.size() == 10}">10</option>
                        <option value="25" th:selected="${itemPage.size() == 25}">25</option>
                        <option value="50" th:selected="${itemPage.size() == 50}">50</option>
                    </select>
                </label>
            </nav>
        </section>
    </div>
</main>
</body>
</html>
