<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Inline edit form for a service schedule.
  Parameters:
    sched          - ServiceSchedule being edited
    vendors        - List<Vendor> for the dropdown
    frequencyUnits - FrequencyUnit[] enum values
    formId         - the row id for toggle (e.g. 'edit-{uuid}')
    colspan        - number of columns to span
-->
<th:block th:fragment="editForm(sched, vendors, frequencyUnits, formId, colspan)">
    <tr th:id="${formId}" class="form-row" style="display:none">
        <td th:colspan="${colspan}">
            <form method="post" th:action="@{/schedules/{id}(id=${sched.id})}" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <label>Type <input type="text"
                        name="serviceType" required
                        th:value="${sched.serviceType}"/>
                </label>
                <th:block th:replace="~{fragments/vendor-select :: vendorFields(${vendors}, ${sched.preferredVendor}, true)}"/>
                <label>Next Due <input type="date" name="nextDueDate" required
                        th:value="${sched.nextDueDate}"/></label>
                <label>Every <input type="number" name="frequencyInterval"
                                    min="1" required style="width:4rem"
                                    th:value="${sched.frequencyInterval}"/></label>
                <label>
                    <select name="frequencyUnit" required>
                        <option th:each="fu : ${frequencyUnits}"
                                th:value="${fu}" th:text="${fu}"
                                th:selected="${fu == sched.frequencyUnit}"></option>
                    </select>
                </label>
                <button type="submit" class="btn-icon btn-edit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Save
                </button>
                <button type="button" class="btn-icon btn-cancel" title="Cancel"
                        th:data-toggle-form="${formId}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </form>
        </td>
    </tr>
</th:block>
</body>
</html>
