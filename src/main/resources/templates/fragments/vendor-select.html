<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Vendor dropdown with inline "new vendor" fields.
  Parameters:
    vendors      - List<Vendor> of available vendors
    selected     - Vendor or null (pre-selected vendor)
    required     - boolean (whether selection is required)
    fieldPrefix  - unused, kept for clarity
-->
<th:block th:fragment="vendorFields(vendors, selected, required)">
    <label>Vendor
        <select name="vendorId" data-vendor-change="true"
                th:required="${required}">
            <option th:unless="${required}" value="">None</option>
            <option th:if="${required}" value="" disabled
                    th:selected="${selected == null}">Select vendor</option>
            <option th:each="v : ${vendors}"
                    th:value="${v.id}" th:text="${v.name}"
                    th:selected="${selected != null and selected.id.equals(v.id)}"></option>
            <option th:value="${T(solutions.mystuff.application.web.ControllerHelper).NEW_VENDOR_SENTINEL}">+ New vendor...</option>
        </select>
    </label>
    <span class="new-vendor-fields" style="display:none">
        <label>Name <input type="text" name="newVendorName"
                           placeholder="Vendor name"/></label>
        <label>Phone <input type="text" name="newVendorPhone"
                            placeholder="Phone"/></label>
    </span>
</th:block>
</body>
</html>
