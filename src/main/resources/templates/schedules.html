<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<main>
    <div th:if="${error}">
        <p class="error" th:text="${error}"></p>
    </div>
    <div th:if="${noOrganization}">
        <p>You are not assigned to an organization.
           Please contact an administrator.</p>
    </div>
    <div th:unless="${noOrganization}">
        <section id="schedules">
            <h2>Upcoming Service</h2>
            <p th:if="${#lists.isEmpty(schedules)}">No upcoming service.</p>
            <table th:unless="${#lists.isEmpty(schedules)}">
                <thead>
                <tr>
                    <th>Item</th>
                    <th>Location</th>
                    <th>Details</th>
                    <th>Service Type</th>
                    <th>Vendor</th>
                    <th>Next Due</th>
                    <th>Frequency</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="s : ${schedules}">
                <tr th:classappend="${s.nextDueDate == null ? ''
                        : (s.nextDueDate.isBefore(today)
                            ? 'schedule-overdue'
                            : (s.nextDueDate.isBefore(soon)
                                ? 'schedule-soon'
                                : 'schedule-ok'))}">
                    <td th:text="${s.item.name}"></td>
                    <td th:text="${s.item.location}"></td>
                    <td><span th:if="${s.item.modelName}" th:text="${s.item.modelName}"></span>
                        <span th:if="${s.item.modelYear}" th:text="' (' + ${s.item.modelYear} + ')'"></span>
                        <span th:if="${s.item.serialNumber}" class="serial-number"
                              th:text="' S/N: ' + ${s.item.serialNumber}"></span></td>
                    <td th:text="${s.serviceType}"></td>
                    <td th:text="${s.preferredVendor != null ? s.preferredVendor.name : ''}"></td>
                    <td th:text="${s.nextDueDate}"></td>
                    <td th:text="'Every ' + ${s.frequencyInterval} + ' ' + ${s.frequencyUnit}"></td>
                    <td class="actions">
                        <button type="button" class="btn-icon btn-edit" title="Edit schedule"
                                th:data-target="'edit-' + ${s.id}"
                                onclick="toggleForm(this.getAttribute('data-target'))">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                        </button>
                        <button type="button" class="btn-icon btn-log" title="Log service"
                                th:data-target="'log-' + ${s.id}"
                                onclick="toggleForm(this.getAttribute('data-target'))">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                            </svg>
                        </button>
                        <button type="button" class="btn-icon btn-schedule" title="Create schedule"
                                th:data-target="'sched-' + ${s.id}"
                                onclick="toggleForm(this.getAttribute('data-target'))">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                                <line x1="12" y1="14" x2="12" y2="18"/>
                                <line x1="10" y1="16" x2="14" y2="16"/>
                            </svg>
                        </button>
                        <form method="post" th:action="@{/schedules/delete}" style="display:inline">
                            <input type="hidden" name="scheduleId" th:value="${s.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-icon btn-delete" title="Delete schedule"
                                    onclick="return confirm('Delete this schedule?')">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    <line x1="10" y1="11" x2="10" y2="17"/>
                                    <line x1="14" y1="11" x2="14" y2="17"/>
                                </svg>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:id="'log-' + ${s.id}" class="form-row" style="display:none">
                    <td colspan="8">
                        <form method="post" th:action="@{/schedules/log}" class="inline-form">
                            <input type="hidden" name="scheduleId" th:value="${s.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Date <input type="date" name="serviceDate" required/></label>
                            <label>Summary <input type="text" name="summary" required
                                                  placeholder="What was done"/></label>
                            <label>Vendor
                                <select name="vendorId" onchange="onVendorChange(this)">
                                    <option value="">None</option>
                                    <option th:each="v : ${vendors}"
                                            th:value="${v.id}" th:text="${v.name}"
                                            th:selected="${s.preferredVendor != null and s.preferredVendor.id.equals(v.id)}"></option>
                                    <option value="__new__">+ New vendor...</option>
                                </select>
                            </label>
                            <span class="new-vendor-fields" style="display:none">
                                <label>Name <input type="text" name="newVendorName"
                                                   placeholder="Vendor name"/></label>
                                <label>Phone <input type="text" name="newVendorPhone"
                                                    placeholder="Phone"/></label>
                            </span>
                            <label>Tech <input type="text" name="techName"
                                               placeholder="Technician name"/></label>
                            <button type="submit" class="btn-icon btn-log">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                                Save
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:id="'edit-' + ${s.id}" class="form-row" style="display:none">
                    <td colspan="8">
                        <form method="post" th:action="@{/schedules/edit}" class="inline-form">
                            <input type="hidden" name="scheduleId" th:value="${s.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Type <input type="text" name="serviceType" required
                                               th:value="${s.serviceType}"/></label>
                            <label>Vendor
                                <select name="vendorId" onchange="onVendorChange(this)">
                                    <option value="">None</option>
                                    <option th:each="v : ${vendors}"
                                            th:value="${v.id}" th:text="${v.name}"
                                            th:selected="${s.preferredVendor != null and s.preferredVendor.id.equals(v.id)}"></option>
                                    <option value="__new__">+ New vendor...</option>
                                </select>
                            </label>
                            <span class="new-vendor-fields" style="display:none">
                                <label>Name <input type="text" name="newVendorName"
                                                   placeholder="Vendor name"/></label>
                                <label>Phone <input type="text" name="newVendorPhone"
                                                    placeholder="Phone"/></label>
                            </span>
                            <label>Next Due <input type="date" name="nextDueDate" required
                                                   th:value="${s.nextDueDate}"/></label>
                            <label>Every <input type="number" name="frequencyInterval"
                                                min="1" required style="width:4rem"
                                                th:value="${s.frequencyInterval}"/></label>
                            <label>
                                <select name="frequencyUnit" required>
                                    <option th:each="fu : ${frequencyUnits}"
                                            th:value="${fu}" th:text="${fu}"
                                            th:selected="${fu == s.frequencyUnit}"></option>
                                </select>
                            </label>
                            <button type="submit" class="btn-icon btn-edit">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                                Save
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:id="'sched-' + ${s.id}" class="form-row" style="display:none">
                    <td colspan="8">
                        <form method="post" th:action="@{/schedules/create}" class="inline-form">
                            <input type="hidden" name="itemId" th:value="${s.item.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Type <input type="text"
                                    name="serviceType" required
                                    placeholder="e.g. HVAC Inspection"/>
                            </label>
                            <label>Vendor
                                <select name="vendorId" onchange="onVendorChange(this)">
                                    <option value="">None</option>
                                    <option th:each="v : ${vendors}"
                                            th:value="${v.id}" th:text="${v.name}"
                                            th:selected="${s.preferredVendor != null and s.preferredVendor.id.equals(v.id)}"></option>
                                    <option value="__new__">+ New vendor...</option>
                                </select>
                            </label>
                            <span class="new-vendor-fields" style="display:none">
                                <label>Name <input type="text" name="newVendorName"
                                                   placeholder="Vendor name"/></label>
                                <label>Phone <input type="text" name="newVendorPhone"
                                                    placeholder="Phone"/></label>
                            </span>
                            <label>Next Due <input type="date" name="nextDueDate" required/></label>
                            <label>Every <input type="number" name="frequencyInterval"
                                                min="1" value="1" required style="width:4rem"/></label>
                            <label>
                                <select name="frequencyUnit" required>
                                    <option th:each="fu : ${frequencyUnits}"
                                            th:value="${fu}" th:text="${fu}"></option>
                                </select>
                            </label>
                            <button type="submit" class="btn-icon btn-schedule">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                                Create
                            </button>
                        </form>
                    </td>
                </tr>
                </th:block>
                </tbody>
            </table>
            <nav th:if="${schedPage != null and schedPage.totalPages() > 1}" class="pagination">
                <a th:if="${schedPage.hasPrevious()}"
                   th:href="@{/schedules(page=${schedPage.page() - 1},size=${schedPage.size()})}">Prev</a>
                <span th:text="'Page ' + (${schedPage.page()} + 1) + ' of ' + ${schedPage.totalPages()}"></span>
                <a th:if="${schedPage.hasNext()}"
                   th:href="@{/schedules(page=${schedPage.page() + 1},size=${schedPage.size()})}">Next</a>
                <label class="page-size-label">Show
                    <select onchange="window.location.href='/schedules?size=' + this.value">
                        <option value="10" th:selected="${schedPage.size() == 10}">10</option>
                        <option value="25" th:selected="${schedPage.size() == 25}">25</option>
                        <option value="50" th:selected="${schedPage.size() == 50}">50</option>
                    </select>
                </label>
            </nav>
        </section>
    </div>
</main>
</body>
</html>
