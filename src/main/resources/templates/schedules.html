<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<main>
    <div th:if="${error}">
        <p class="error" th:text="${error}"></p>
    </div>
    <div th:if="${noOrganization}">
        <p>You are not assigned to an organization.
           Please contact an administrator.</p>
    </div>
    <div th:unless="${noOrganization}">
        <section id="schedules">
            <h2>Upcoming Service</h2>
            <p th:if="${#lists.isEmpty(schedules)}">No upcoming service.</p>
            <table th:unless="${#lists.isEmpty(schedules)}">
                <thead>
                <tr>
                    <th>Item</th>
                    <th>Service Type</th>
                    <th>Vendor</th>
                    <th>Next Due</th>
                    <th>Frequency</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="s : ${schedules}">
                <tr th:classappend="${s.nextDueDate == null ? ''
                        : (s.nextDueDate.isBefore(today)
                            ? 'schedule-overdue'
                            : (s.nextDueDate.isBefore(soon)
                                ? 'schedule-soon'
                                : 'schedule-ok'))}">
                    <td th:text="${s.item.name}"></td>
                    <td th:text="${s.serviceType.name}"></td>
                    <td th:text="${s.preferredVendor != null ? s.preferredVendor.name : ''}"></td>
                    <td th:text="${s.nextDueDate}"></td>
                    <td th:text="'Every ' + ${s.frequencyInterval} + ' ' + ${s.frequencyUnit}"></td>
                    <td class="actions">
                        <button type="button" class="btn-icon btn-log"
                                th:attr="onclick='toggleForm(\'log-' + ${s.id} + '\')'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                            </svg>
                            Log
                        </button>
                        <form method="post" th:action="@{/schedules/delete}" style="display:inline">
                            <input type="hidden" name="scheduleId" th:value="${s.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-icon btn-delete"
                                    onclick="return confirm('Delete this schedule?')">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    <line x1="10" y1="11" x2="10" y2="17"/>
                                    <line x1="14" y1="11" x2="14" y2="17"/>
                                </svg>
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:id="'log-' + ${s.id}" class="form-row" style="display:none">
                    <td colspan="6">
                        <form method="post" th:action="@{/schedules/log}" class="inline-form">
                            <input type="hidden" name="scheduleId" th:value="${s.id}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Date <input type="date" name="serviceDate" required/></label>
                            <label>Summary <input type="text" name="summary" required
                                                  placeholder="What was done"/></label>
                            <label>Vendor
                                <select name="vendorId" onchange="onVendorChange(this)">
                                    <option value="">None</option>
                                    <option th:each="v : ${vendors}"
                                            th:value="${v.id}" th:text="${v.name}"
                                            th:selected="${s.preferredVendor != null and s.preferredVendor.id.equals(v.id)}"></option>
                                    <option value="__new__">+ New vendor...</option>
                                </select>
                            </label>
                            <span class="new-vendor-fields" style="display:none">
                                <label>Name <input type="text" name="newVendorName"
                                                   placeholder="Vendor name"/></label>
                                <label>Phone <input type="text" name="newVendorPhone"
                                                    placeholder="Phone"/></label>
                            </span>
                            <label>Tech <input type="text" name="techName"
                                               placeholder="Technician name"/></label>
                            <button type="submit" class="btn-log">Save</button>
                        </form>
                    </td>
                </tr>
                </th:block>
                </tbody>
            </table>
            <nav th:if="${schedPage != null and schedPage.totalPages() > 1}" class="pagination">
                <a th:if="${schedPage.hasPrevious()}"
                   th:href="@{/schedules(page=${schedPage.page() - 1},size=${schedPage.size()})}">Prev</a>
                <span th:text="'Page ' + (${schedPage.page()} + 1) + ' of ' + ${schedPage.totalPages()}"></span>
                <a th:if="${schedPage.hasNext()}"
                   th:href="@{/schedules(page=${schedPage.page() + 1},size=${schedPage.size()})}">Next</a>
                <label class="page-size-label">Show
                    <select onchange="window.location.href='/schedules?size=' + this.value">
                        <option value="10" th:selected="${schedPage.size() == 10}">10</option>
                        <option value="25" th:selected="${schedPage.size() == 25}">25</option>
                        <option value="50" th:selected="${schedPage.size() == 50}">50</option>
                    </select>
                </label>
            </nav>
        </section>
    </div>
</main>
</body>
</html>
