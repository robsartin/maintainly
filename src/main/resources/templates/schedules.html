<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<main id="main-content">
    <div th:if="${error}">
        <p class="error" th:text="${error}"></p>
    </div>
    <div th:if="${noOrganization}">
        <p>You are not assigned to an organization.
           Please contact an administrator.</p>
    </div>
    <div th:unless="${noOrganization}">
        <section id="schedules">
            <h2>Upcoming Service</h2>
            <div th:if="${#lists.isEmpty(schedules)}" class="empty-state">
                <p>No upcoming service. Create a schedule from the <a th:href="@{/items}">Items</a> page.</p>
            </div>
            <p th:if="${#lists.isEmpty(schedules)}">No upcoming service.</p>
            <div class="table-scroll-wrapper">

            <table th:unless="${#lists.isEmpty(schedules)}">
                <thead>
                <tr>
                    <th>Item</th>
                    <th>Location</th>
                    <th>Details</th>
                    <th>Service Type</th>
                    <th>Vendor</th>
                    <th>Next Due</th>
                    <th>Frequency</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="s : ${schedules}">
                <tr th:classappend="${s.nextDueDate == null ? ''
                        : (s.nextDueDate.isBefore(today)
                            ? 'schedule-overdue'
                            : (s.nextDueDate.isBefore(soon)
                                ? 'schedule-soon'
                                : 'schedule-ok'))}">
                    <td th:text="${s.item.name}"></td>
                    <td th:text="${s.item.location}"></td>
                    <td><span th:if="${s.item.modelName}" th:text="${s.item.modelName}"></span>
                        <span th:if="${s.item.modelYear}" th:text="' (' + ${s.item.modelYear} + ')'"></span>
                        <span th:if="${s.item.serialNumber}" class="serial-number"
                              th:text="' S/N: ' + ${s.item.serialNumber}"></span></td>
                    <td th:text="${s.serviceType}"></td>
                    <td th:text="${s.preferredVendor != null ? s.preferredVendor.name : ''}"></td>
                    <td th:text="${s.nextDueDate}" style="white-space:nowrap"></td>
                    <td th:text="'Every ' + ${s.frequencyInterval} + ' ' + (${s.frequencyInterval == 1 ? s.frequencyUnit.name().substring(0, s.frequencyUnit.name().length() - 1) : s.frequencyUnit})"></td>
                    <td class="actions">
                        <button type="button" class="btn-icon btn-log" title="Log service"
                                th:data-target="'log-' + ${s.id}"
>
                            <svg th:replace="~{fragments/icons :: icon-log}"></svg>
                        </button>
                        <button type="button" class="btn-icon btn-schedule" title="Create schedule"
                                th:data-target="'sched-' + ${s.id}"
>
                            <svg th:replace="~{fragments/icons :: icon-calendar-plus}"></svg>
                        </button>
                        <button type="button" class="btn-icon btn-edit" title="Edit schedule"
                                th:data-target="'edit-' + ${s.id}"
>
                            <svg th:replace="~{fragments/icons :: icon-pencil}"></svg>
                        </button>
                        <form method="post" th:action="@{/schedules/{id}(id=${s.id})}" style="display:inline">
                            <input type="hidden" name="_method" value="DELETE"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-icon btn-delete" title="Delete schedule"
                                    data-confirm-submit="Delete this schedule?">
                                <svg th:replace="~{fragments/icons :: icon-trash}"></svg>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:id="'log-' + ${s.id}" class="form-row" style="display:none">
                    <td colspan="8">
                        <form method="post" th:action="@{/schedules/{id}/completions(id=${s.id})}" class="inline-form">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Date <input type="date" name="serviceDate" required/></label>
                            <label>Summary <input type="text" name="summary" required
                                                  placeholder="What was done"/></label>
                            <th:block th:replace="~{fragments/vendor-select :: vendorFields(${vendors}, ${s.preferredVendor}, false)}"/>
                            <label>Tech <input type="text" name="techName"
                                               placeholder="Technician name"/></label>
                            <label>Cost <input type="number" name="cost"
                                               step="0.01" min="0"
                                               placeholder="0.00"/></label>
                            <button type="submit" class="btn-icon btn-log">
                                <svg th:replace="~{fragments/icons :: icon-checkmark}"></svg>
                                Save
                            </button>
                            <button type="button" class="btn-icon btn-cancel" title="Cancel"
                                    th:data-toggle-form="'log-' + ${s.id}">
                                <svg th:replace="~{fragments/icons :: icon-cancel}"></svg>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:id="'sched-' + ${s.id}" class="form-row" style="display:none">
                    <td colspan="8">
                        <form method="post" th:action="@{/items/{id}/schedules(id=${s.item.id})}" class="inline-form">
                            <input type="hidden" name="redirectTo" value="schedules"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <label>Type <input type="text"
                                    name="serviceType" required
                                    placeholder="e.g. HVAC Inspection"/>
                            </label>
                            <th:block th:replace="~{fragments/vendor-select :: vendorFields(${vendors}, ${s.preferredVendor}, true)}"/>
                            <label>Next Due <input type="date" name="nextDueDate" required/></label>
                            <label>Every <input type="number" name="frequencyInterval"
                                                min="1" value="1" required style="width:4rem"/></label>
                            <label>
                                <select name="frequencyUnit" required>
                                    <option th:each="fu : ${frequencyUnits}"
                                            th:value="${fu}" th:text="${fu}"></option>
                                </select>
                            </label>
                            <button type="submit" class="btn-icon btn-schedule">
                                <svg th:replace="~{fragments/icons :: icon-checkmark}"></svg>
                                Create
                            </button>
                            <button type="button" class="btn-icon btn-cancel" title="Cancel"
                                    th:data-toggle-form="'sched-' + ${s.id}">
                                <svg th:replace="~{fragments/icons :: icon-cancel}"></svg>
                            </button>
                        </form>
                    </td>
                </tr>
                <th:block th:replace="~{fragments/schedule-edit-form :: editForm(${s}, ${vendors}, ${frequencyUnits}, 'edit-' + ${s.id}, 8)}"/>
                </th:block>
                </tbody>
            </table>
            </div>
            <nav th:if="${schedPage != null and (schedPage.hasPrevious() or schedPage.hasNext())}" class="pagination">
                <a th:if="${schedPage.hasPrevious()}"
                   th:href="@{/schedules(page=${schedPage.page() - 1},size=${schedPage.size()})}">Prev</a>
                <span th:text="'Page ' + (${schedPage.page()} + 1)"></span>
                <a th:if="${schedPage.hasNext()}"
                   th:href="@{/schedules(page=${schedPage.page() + 1},size=${schedPage.size()})}">Next</a>
                <label class="page-size-label">Show
                    <select data-page-size="/schedules">
                        <option value="10" th:selected="${schedPage.size() == 10}">10</option>
                        <option value="25" th:selected="${schedPage.size() == 25}">25</option>
                        <option value="50" th:selected="${schedPage.size() == 50}">50</option>
                        <option value="100" th:selected="${schedPage.size() == 100}">100</option>
                    </select>
                </label>
            </nav>
        </section>
    </div>
</main>
</body>
</html>
