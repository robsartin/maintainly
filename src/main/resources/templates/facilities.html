<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<div th:replace="~{layout :: toasts}"></div>
<main id="main-content">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li><a th:href="@{/}">Home</a></li>
            <li>Facilities</li>
        </ol>
    </nav>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${noOrganization}" class="alert alert-warning">
        No organization assigned. Please contact your administrator.
    </div>

    <div th:unless="${noOrganization}" class="section-header">
        <h2>Facilities</h2>
        <div>
            <button type="button" class="btn-icon btn-add" title="Add facility"
                    data-toggle-form="add-facility-form">
                <svg th:replace="~{fragments/icons :: icon-plus}"></svg>
            </button>
        </div>
    </div>

    <div id="add-facility-form" style="display:none" class="vendor-form-panel">
        <h3>New Facility</h3>
        <form th:action="@{/facilities}" method="post" class="vendor-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label>Name <input type="text" name="name" required maxlength="200"/></label>
            <label>Address Line 1 <input type="text" name="addressLine1" maxlength="200"/></label>
            <label>Address Line 2 <input type="text" name="addressLine2" maxlength="200"/></label>
            <label>City <input type="text" name="city" maxlength="100"/></label>
            <label>State/Province <input type="text" name="stateProvince" maxlength="100"/></label>
            <label>Postal Code <input type="text" name="postalCode" maxlength="30"/></label>
            <label>Country <input type="text" name="country" maxlength="100"/></label>
            <button type="submit" class="btn-icon btn-add" title="Save">
                <svg th:replace="~{fragments/icons :: icon-checkmark}"></svg>
            </button>
            <button type="button" class="btn-icon btn-cancel" title="Cancel"
                    data-toggle-form="add-facility-form">
                <svg th:replace="~{fragments/icons :: icon-cancel}"></svg>
            </button>
        </form>
    </div>

    <div class="table-scroll-wrapper">
    <table th:unless="${noOrganization}" class="data-table">
        <thead>
        <tr>
            <th>Name</th>
            <th>Address</th>
            <th>City</th>
            <th>State/Province</th>
            <th>Country</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(facilities)}">
            <td colspan="6" class="empty-state">No facilities yet. Click the <strong>+</strong> button above to add one.</td>
        </tr>
        <th:block th:each="facility : ${facilities}">
            <tr>
                <td th:text="${facility.name}"></td>
                <td>
                    <span th:text="${facility.addressLine1}"></span>
                    <span th:if="${facility.addressLine2 != null}"
                          th:text="', ' + ${facility.addressLine2}"></span>
                </td>
                <td th:text="${facility.city}"></td>
                <td th:text="${facility.stateProvince}"></td>
                <td th:text="${facility.country}"></td>
                <td class="actions">
                    <button type="button" class="btn-icon" title="Edit facility"
                            th:data-toggle-form="'edit-' + ${facility.id}">
                        <svg th:replace="~{fragments/icons :: icon-vendor-edit}"></svg>
                    </button>
                    <form th:action="@{/facilities/{id}(id=${facility.id})}" method="post"
                          style="display:inline">
                        <input type="hidden" name="_method" value="DELETE"/>
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-icon btn-delete" title="Delete facility"
                                data-confirm-submit="Delete this facility?"
                                th:data-confirm-name="${facility.name}">
                            <svg th:replace="~{fragments/icons :: icon-trash}"></svg>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:id="'edit-' + ${facility.id}" style="display:none">
                <td colspan="6">
                    <form th:action="@{/facilities/{id}(id=${facility.id})}" method="post"
                          class="vendor-form">
                        <input type="hidden" name="_method" value="PUT"/>
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <label>Name <input type="text" name="name" th:value="${facility.name}"
                                           required maxlength="200"/></label>
                        <label>Address Line 1 <input type="text" name="addressLine1"
                                                      th:value="${facility.addressLine1}"
                                                      maxlength="200"/></label>
                        <label>Address Line 2 <input type="text" name="addressLine2"
                                                      th:value="${facility.addressLine2}"
                                                      maxlength="200"/></label>
                        <label>City <input type="text" name="city" th:value="${facility.city}"
                                           maxlength="100"/></label>
                        <label>State/Province <input type="text" name="stateProvince"
                                                      th:value="${facility.stateProvince}"
                                                      maxlength="100"/></label>
                        <label>Postal Code <input type="text" name="postalCode"
                                                   th:value="${facility.postalCode}"
                                                   maxlength="30"/></label>
                        <label>Country <input type="text" name="country"
                                              th:value="${facility.country}"
                                              maxlength="100"/></label>
                        <button type="submit" class="btn-icon btn-add" title="Save">
                            <svg th:replace="~{fragments/icons :: icon-checkmark}"></svg>
                        </button>
                        <button type="button" class="btn-icon btn-cancel" title="Cancel"
                                th:data-toggle-form="'edit-' + ${facility.id}">
                            <svg th:replace="~{fragments/icons :: icon-cancel}"></svg>
                        </button>
                    </form>
                </td>
            </tr>
        </th:block>
        </tbody>
    </table>
    </div>
</main>
</body>
</html>
